<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Exporter — Power Query</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="extractor.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0: #0c0c0e;
    --bg-1: #141418;
    --bg-2: #1c1c22;
    --bg-3: #26262e;
    --border: #2e2e38;
    --border-hover: #3e3e4a;
    --text-0: #e8e6e3;
    --text-1: #a09e9a;
    --text-2: #6e6c68;
    --amber: #f0a500;
    --amber-dim: #b37e00;
    --amber-glow: rgba(240, 165, 0, 0.12);
    --red: #e04848;
    --green: #3cb56c;
    --blue: #4a9eff;
    --purple: #d4a0ff;
    --mono: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html { font-size: 15px; }
  body {
    font-family: var(--sans);
    background: var(--bg-0);
    color: var(--text-0);
    min-height: 100vh;
    line-height: 1.5;
  }

  .shell { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  header {
    display: flex; align-items: baseline; gap: 1rem;
    padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem;
  }
  header h1 { font-family: var(--mono); font-weight: 700; font-size: 1.4rem; letter-spacing: -0.03em; color: var(--amber); }
  header h1 span { color: var(--text-2); font-weight: 400; }
  header .tag {
    font-family: var(--mono); font-size: 0.7rem; color: var(--text-2);
    background: var(--bg-2); padding: 0.2em 0.6em; border-radius: 3px;
    border: 1px solid var(--border); letter-spacing: 0.05em; text-transform: uppercase;
  }
  .privacy-note { font-family: var(--mono); font-size: 0.62rem; color: var(--text-2); margin-left: auto; }

  .workspace { display: grid; grid-template-columns: 340px 1fr; gap: 1.5rem; align-items: start; }
  @media (max-width: 800px) { .workspace { grid-template-columns: 1fr; } }

  .panel { background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .panel-head {
    font-family: var(--mono); font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2);
    padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border); background: var(--bg-2);
  }
  .panel-body { padding: 1.2rem; }

  .dropzone {
    border: 2px dashed var(--border); border-radius: 6px; padding: 2rem 1.2rem;
    text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative;
  }
  .dropzone:hover, .dropzone.drag-over { border-color: var(--amber); background: var(--amber-glow); }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .dropzone-icon { font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-2); transition: color 0.2s; }
  .dropzone:hover .dropzone-icon, .dropzone.drag-over .dropzone-icon { color: var(--amber); }
  .dropzone-label { font-size: 0.85rem; color: var(--text-1); }
  .dropzone-label strong { color: var(--amber); }
  .dropzone-hint { font-family: var(--mono); font-size: 0.68rem; color: var(--text-2); margin-top: 0.4rem; }

  .file-chip { display: flex; align-items: center; gap: 0.6rem; background: var(--bg-2); border: 1px solid var(--border); border-radius: 5px; padding: 0.6rem 1rem; margin-top: 1rem; }
  .file-chip-icon { color: var(--amber); font-size: 1.1rem; }
  .file-chip-name { font-family: var(--mono); font-size: 0.78rem; color: var(--text-0); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-chip-size { font-family: var(--mono); font-size: 0.68rem; color: var(--text-2); }
  .file-chip-remove { background: none; border: none; color: var(--text-2); cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; }
  .file-chip-remove:hover { color: var(--red); }

  .control-group { margin-top: 1.2rem; }
  .control-group label { display: block; font-family: var(--mono); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-2); margin-bottom: 0.4rem; }

  .select-wrap { position: relative; }
  .select-wrap select { width: 100%; appearance: none; font-family: var(--mono); font-size: 0.82rem; color: var(--text-0); background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; padding: 0.55rem 2rem 0.55rem 0.8rem; cursor: pointer; transition: border-color 0.15s; }
  .select-wrap select:hover { border-color: var(--border-hover); }
  .select-wrap select:focus { border-color: var(--amber); outline: none; }
  .select-wrap::after { content: "\25BE"; position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-2); pointer-events: none; font-size: 0.8rem; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 1.2rem; padding: 0.6rem 0; }
  .toggle-row span { font-family: var(--mono); font-size: 0.78rem; color: var(--text-1); }
  .toggle { position: relative; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: var(--bg-3); border-radius: 11px; cursor: pointer; transition: background 0.2s; border: 1px solid var(--border); }
  .toggle-track::after { content: ""; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: var(--text-2); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--amber-dim); border-color: var(--amber); }
  .toggle input:checked + .toggle-track::after { transform: translateX(18px); background: var(--amber); }

  .btn-run {
    width: 100%; margin-top: 1.5rem; font-family: var(--mono); font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.04em; color: var(--bg-0); background: var(--amber); border: none; border-radius: 5px;
    padding: 0.75rem 1.5rem; cursor: pointer; transition: background 0.15s, transform 0.1s; position: relative; overflow: hidden;
  }
  .btn-run:hover { background: #ffb515; }
  .btn-run:active { transform: scale(0.98); }
  .btn-run:disabled { background: var(--bg-3); color: var(--text-2); cursor: not-allowed; transform: none; }
  .btn-run.processing { background: var(--amber-dim); pointer-events: none; }
  .btn-run.processing::after { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 30%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0%{left:-30%} 100%{left:100%} }

  .output-panel { min-height: 400px; display: flex; flex-direction: column; }
  .output-panel .panel-head { display: flex; align-items: center; justify-content: space-between; }
  .output-actions { display: flex; gap: 0.5rem; }
  .btn-sm { font-family: var(--mono); font-size: 0.68rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-1); background: var(--bg-1); border: 1px solid var(--border); border-radius: 3px; padding: 0.3em 0.7em; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .btn-sm:hover { border-color: var(--amber); color: var(--amber); }

  .output-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .output-tab { font-family: var(--mono); font-size: 0.72rem; font-weight: 500; color: var(--text-2); background: none; border: none; border-bottom: 2px solid transparent; padding: 0.6rem 1.2rem; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .output-tab:hover { color: var(--text-1); }
  .output-tab.active { color: var(--amber); border-bottom-color: var(--amber); }
  .output-content { flex: 1; position: relative; }
  .output-view { display: none; height: 100%; }
  .output-view.active { display: block; }
  .output-raw { font-family: var(--mono); font-size: 0.78rem; line-height: 1.65; color: var(--text-0); background: var(--bg-0); border: none; padding: 1.2rem; width: 100%; min-height: 400px; resize: vertical; overflow: auto; }
  .output-raw:focus { outline: none; }
  .output-rendered { padding: 1.5rem; overflow: auto; min-height: 400px; max-height: 75vh; }

  .output-rendered h1 { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; color: var(--amber); margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .output-rendered h2 { font-family: var(--mono); font-size: 1rem; font-weight: 600; color: var(--text-0); margin-top: 2rem; margin-bottom: 0.6rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
  .output-rendered h3 { font-family: var(--mono); font-size: 0.88rem; font-weight: 600; color: var(--amber); margin-top: 1.5rem; margin-bottom: 0.5rem; }
  .output-rendered blockquote { font-size: 0.82rem; color: var(--text-1); border-left: 3px solid var(--amber-dim); padding: 0.4rem 1rem; margin: 0.6rem 0; background: var(--amber-glow); border-radius: 0 4px 4px 0; }
  .output-rendered ul { margin: 0.3rem 0 0.6rem 1.5rem; font-size: 0.82rem; color: var(--text-1); }
  .output-rendered li { margin-bottom: 0.15rem; }
  .output-rendered pre { background: var(--bg-0); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.2rem; overflow-x: auto; margin: 0.4rem 0 1rem; }
  .output-rendered code { font-family: var(--mono); font-size: 0.78rem; line-height: 1.6; color: var(--text-0); }
  .output-rendered strong { color: var(--text-0); }
  .output-rendered .kw { color: var(--blue); }
  .output-rendered .str { color: var(--green); }
  .output-rendered .cmt { color: var(--text-2); font-style: italic; }
  .output-rendered .fn { color: #d4a0ff; }
  .output-rendered .num { color: #e0905a; }

  .graph-container { position: relative; min-height: 450px; background: var(--bg-0); overflow: hidden; cursor: grab; }
  .graph-container:active { cursor: grabbing; }
  .graph-container svg { display: block; }
  .graph-node rect { transition: opacity 0.2s; }
  .graph-node text { font-family: var(--mono); pointer-events: none; transition: opacity 0.2s; }
  .graph-edge { fill: none; stroke-width: 1.5; transition: opacity 0.2s, stroke 0.2s; }
  .graph-container.has-hover .graph-node.dimmed rect { opacity: 0.15; }
  .graph-container.has-hover .graph-node.dimmed text { opacity: 0.15; }
  .graph-container.has-hover .graph-edge.dimmed { opacity: 0.06; }
  .graph-node.highlighted rect { stroke-width: 2; }

  .graph-tooltip { position: absolute; background: var(--bg-2); border: 1px solid var(--border); border-radius: 5px; padding: 0.7rem 1rem; font-family: var(--mono); font-size: 0.72rem; color: var(--text-1); pointer-events: none; opacity: 0; transition: opacity 0.15s; max-width: 300px; z-index: 10; line-height: 1.6; }
  .graph-tooltip.visible { opacity: 1; }
  .graph-tooltip strong { color: var(--text-0); display: block; margin-bottom: 0.2rem; }
  .graph-tooltip .tt-kind { color: var(--amber); }
  .graph-tooltip .tt-dep { color: var(--blue); }
  .graph-tooltip .tt-src { color: var(--green); }

  .graph-legend { position: absolute; bottom: 0.8rem; left: 0.8rem; display: flex; gap: 1rem; font-family: var(--mono); font-size: 0.65rem; color: var(--text-2); background: rgba(12, 12, 14, 0.85); padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--border); }
  .graph-legend-item { display: flex; align-items: center; gap: 0.3rem; }
  .graph-legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .graph-controls { position: absolute; top: 0.8rem; right: 0.8rem; display: flex; gap: 0.3rem; }
  .graph-ctrl-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; color: var(--text-2); font-family: var(--mono); font-size: 0.82rem; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .graph-ctrl-btn:hover { border-color: var(--amber); color: var(--amber); }

  .graph-fullscreen-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: var(--bg-0); flex-direction: column; }
  .graph-fullscreen-overlay.active { display: flex; }
  .graph-fullscreen-overlay .fs-header { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg-1); flex-shrink: 0; }
  .graph-fullscreen-overlay .fs-title { font-family: var(--mono); font-size: 0.82rem; font-weight: 600; color: var(--amber); }
  .graph-fullscreen-overlay .fs-close { font-family: var(--mono); font-size: 0.75rem; color: var(--text-1); background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; padding: 0.35em 0.8em; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
  .graph-fullscreen-overlay .fs-close:hover { border-color: var(--amber); color: var(--amber); }
  .graph-fullscreen-overlay .fs-body { flex: 1; position: relative; overflow: hidden; cursor: grab; }
  .graph-fullscreen-overlay .fs-body:active { cursor: grabbing; }
  .graph-fullscreen-overlay .fs-body svg { display: block; }
  .graph-fullscreen-overlay .graph-legend { position: absolute; bottom: 0.8rem; left: 0.8rem; }
  .graph-fullscreen-overlay .graph-controls { position: absolute; top: 0.8rem; right: 0.8rem; }

  .stats-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; padding: 0.6rem 1.2rem; border-top: 1px solid var(--border); background: var(--bg-2); font-family: var(--mono); font-size: 0.7rem; color: var(--text-2); }
  .stat-chip { display: inline-flex; align-items: center; gap: 0.35rem; background: var(--bg-1); border: 1px solid var(--border); border-radius: 3px; padding: 0.2em 0.6em; }
  .stat-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-param { background: var(--blue); }
  .dot-query { background: var(--amber); }
  .dot-func  { background: #d4a0ff; }
  .dot-dep   { background: var(--text-2); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; color: var(--text-2); text-align: center; padding: 2rem; }
  .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state-text { font-family: var(--mono); font-size: 0.82rem; }
  .error-banner { background: rgba(224, 72, 72, 0.1); border: 1px solid rgba(224, 72, 72, 0.3); border-radius: 4px; padding: 0.7rem 1rem; margin-top: 1rem; font-family: var(--mono); font-size: 0.78rem; color: var(--red); }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>M<span>_</span>EXPORTER</h1>
    <span class="tag">Power Query</span>
    <span class="privacy-note">Files never leave your browser</span>
  </header>

  <div class="workspace">
    <div>
      <div class="panel">
        <div class="panel-head">Input</div>
        <div class="panel-body">
          <div class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept=".pbix,.pbit" />
            <div class="dropzone-icon">&#9776;</div>
            <div class="dropzone-label">Drop file or <strong>browse</strong></div>
            <div class="dropzone-hint">.pbix &middot; .pbit</div>
          </div>
          <div id="fileChip" style="display:none" class="file-chip">
            <span class="file-chip-icon">&#9830;</span>
            <span class="file-chip-name" id="fileName"></span>
            <span class="file-chip-size" id="fileSize"></span>
            <button class="file-chip-remove" id="fileRemove">&times;</button>
          </div>
          <div class="control-group">
            <label>Extraction Mode</label>
            <div class="select-wrap">
              <select id="modeSelect">
                <option value="auto">Auto-detect</option>
                <option value="pbix-datamashup">PBIX / DataMashup</option>
                <option value="pbit-json">PBIT / JSON Schema</option>
              </select>
            </div>
          </div>
          <div class="toggle-row">
            <span>Include metadata</span>
            <label class="toggle"><input type="checkbox" id="metadataToggle" /><span class="toggle-track"></span></label>
          </div>
          <div id="errorBox" class="error-banner" style="display:none"></div>
          <button class="btn-run" id="runBtn" disabled>EXTRACT</button>
        </div>
      </div>
    </div>

    <div class="panel output-panel" id="outputPanel">
      <div class="panel-head">
        <span>Output</span>
        <div class="output-actions" id="outputActions" style="display:none">
          <button class="btn-sm" id="copyBtn">Copy</button>
          <button class="btn-sm" id="downloadBtn">Download .md</button>
        </div>
      </div>
      <div class="output-tabs" id="outputTabs" style="display:none">
        <button class="output-tab active" data-tab="graph">Graph</button>
        <button class="output-tab" data-tab="rendered">Rendered</button>
        <button class="output-tab" data-tab="raw">Markdown</button>
      </div>
      <div class="output-content">
        <div class="output-view active" id="view-graph">
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">&#9998;</div>
            <div class="empty-state-text">Upload a .pbix or .pbit file to extract M code</div>
          </div>
          <div class="graph-container" id="graphContainer" style="display:none">
            <svg id="graphSvg"></svg>
            <div class="graph-tooltip" id="graphTooltip"></div>
            <div class="graph-legend">
              <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--blue)"></div> Parameter</div>
              <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--amber)"></div> Query</div>
              <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--purple)"></div> Function</div>
            </div>
            <div class="graph-controls">
              <button class="graph-ctrl-btn" id="popoutBtn" title="Pop out fullscreen">&#11036;</button>
              <button class="graph-ctrl-btn" id="zoomIn" title="Zoom in">+</button>
              <button class="graph-ctrl-btn" id="zoomOut" title="Zoom out">&minus;</button>
              <button class="graph-ctrl-btn" id="zoomFit" title="Fit to view">&#8690;</button>
            </div>
          </div>
        </div>
        <div class="output-view" id="view-rendered">
          <div class="output-rendered" id="renderedOutput" style="display:none"></div>
        </div>
        <div class="output-view" id="view-raw">
          <textarea class="output-raw" id="rawOutput" readonly></textarea>
        </div>
      </div>
      <div class="stats-bar" id="statsBar" style="display:none">
        <span class="stat-chip"><span class="dot dot-param"></span> <span id="statParams">0</span> params</span>
        <span class="stat-chip"><span class="dot dot-query"></span> <span id="statQueries">0</span> queries</span>
        <span class="stat-chip"><span class="dot dot-func"></span> <span id="statFuncs">0</span> functions</span>
        <span class="stat-chip"><span class="dot dot-dep"></span> <span id="statDeps">0</span> deps</span>
      </div>
    </div>
  </div>
</div>

<!-- Fullscreen graph overlay -->
<div class="graph-fullscreen-overlay" id="fsOverlay">
  <div class="fs-header">
    <span class="fs-title">Dependency Graph</span>
    <button class="fs-close" id="fsClose">ESC &times; Close</button>
  </div>
  <div class="fs-body" id="fsBody">
    <svg id="fsSvg"></svg>
    <div class="graph-tooltip" id="fsTooltip"></div>
    <div class="graph-legend">
      <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--blue)"></div> Parameter</div>
      <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--amber)"></div> Query</div>
      <div class="graph-legend-item"><div class="graph-legend-dot" style="background:var(--purple)"></div> Function</div>
    </div>
    <div class="graph-controls">
      <button class="graph-ctrl-btn" id="fsZoomIn" title="Zoom in">+</button>
      <button class="graph-ctrl-btn" id="fsZoomOut" title="Zoom out">&minus;</button>
      <button class="graph-ctrl-btn" id="fsZoomFit" title="Fit to view">&#8690;</button>
    </div>
  </div>
</div>

<script src="ui.js"></script>
</body>
</html>
